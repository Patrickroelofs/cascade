name: Coolify Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Get active deployment UUID for PR
        id: get-deployment
        run: |
            # Fetch the latest deployments globally across your Coolify instance
            RESPONSE=$(curl -s -X GET \
              "${{ secrets.COOLIFY_URL }}/api/v1/deployments" \
              -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
              -H "Content-Type: application/json")
            
            echo "Raw API Response: $RESPONSE"
            
            # Grab the most recent deployment UUID from the global list
            # Note: If you have multiple heavily active apps, you may need to filter this 
            # by your specific APP_UUID using jq 'select()' logic.
            DEPLOYMENT_UUID=$(echo "$RESPONSE" | jq -r '.data[0]?.deployment_uuid // empty')
            
            if [ -z "$DEPLOYMENT_UUID" ] || [ "$DEPLOYMENT_UUID" = "null" ]; then
              echo "No active deployments found."
              exit 1
            fi
            
            echo "deployment_uuid=$DEPLOYMENT_UUID" >> "$GITHUB_OUTPUT"

      - name: Poll deployment status
        run: |
          UUID="${{ steps.trigger.outputs.deployment_uuid }}"
          MAX_ATTEMPTS=60
          SLEEP_SECONDS=10

          for i in $(seq 1 $MAX_ATTEMPTS); do
            STATUS_RESPONSE=$(curl -s -X GET \
              "${{ secrets.COOLIFY_URL }}/api/v1/deployments/$UUID" \
              -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}")

            STATUS=$(echo "$STATUS_RESPONSE" | jq -r '.status')
            echo "Attempt $i/$MAX_ATTEMPTS - Status: $STATUS"

            case "$STATUS" in
              finished)
                echo "✅ Deployment succeeded"
                exit 0
                ;;
              failed|cancelled)
                echo "❌ Deployment $STATUS"
                echo "$STATUS_RESPONSE" | jq .
                exit 1
                ;;
              *)
                sleep $SLEEP_SECONDS
                ;;
            esac
          done

          echo "⏱️ Timed out waiting for deployment"
          exit 1